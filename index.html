<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Leaflet WMS Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet from unpkg -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #controls {
      padding: 8px;
      background: #f5f5f5;
      border-bottom: 1px solid #ccc;
      font-family: sans-serif;
    }
    #map {
      height: calc(100% - 48px);
    }
    input {
      width: 70%;
    }
  </style>
</head>
<body>

<div id="controls">
  <label for="wmsUrl">WMS URL:</label>
  <input
    id="wmsUrl"
    type="text"
    placeholder="https://example.com/geoserver/wms"
  />
  <button onclick="loadWMS()">Load WMS</button>
</div>

<div id="map"></div>

<script>
  // Initialise map
  const map = L.map('map').setView([52, 5], 6);

  // Background layer (provided)
  L.tileLayer('https://tile.maris.nl/cdi/{z}/{x}/{y}.png', {
    attribution: '&copy; MARIS'
  }).addTo(map);

  let wmsLayers = [];

  function clearWMSLayers() {
    wmsLayers.forEach(layer => map.removeLayer(layer));
    wmsLayers = [];
  }

  async function loadWMS() {
    const baseUrl = document.getElementById('wmsUrl').value.trim();
    if (!baseUrl) {
      alert('Please enter a WMS URL');
      return;
    }

    clearWMSLayers();

    const capabilitiesUrl =
      baseUrl +
      (baseUrl.includes('?') ? '&' : '?') +
      'service=WMS&request=GetCapabilities';

    try {
      const response = await fetch(capabilitiesUrl);
      const text = await response.text();
      const xml = new DOMParser().parseFromString(text, 'text/xml');

      const layers = Array.from(xml.getElementsByTagName('Layer'));
      const namedLayers = layers.filter(
        l => l.getElementsByTagName('Name').length > 0
      );

      namedLayers.forEach(layerEl => {
        const name = layerEl.getElementsByTagName('Name')[0].textContent;

        const layer = L.tileLayer.wms(baseUrl, {
          layers: name,
          format: 'image/png',
          transparent: true
        });

        layer.addTo(map);
        wmsLayers.push(layer);
      });

      if (namedLayers.length === 0) {
        alert('No named layers found in WMS');
      }

    } catch (err) {
      console.error(err);
      alert('Failed to load WMS capabilities');
    }
  }
</script>

</body>
</html>
