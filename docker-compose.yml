version: "3.9"
services:
  rust-backend:
    build:
      context: ./rust-backend
    container_name: rust-backend
    expose:
      - "8000"
    environment:
      - HTTP_PORT=8000
      - CONFIG_DIR=/config
      - LAYER_DIR=/layers
    volumes:
      - ./config:/config:ro
      - ./layers:/layers
    restart: unless-stopped

  node-backend:
    build:
      context: ./node-backend
      dockerfile: Dockerfile
    container_name: node-backend
    ports:
      - "3000:3000"
    environment:
      - HTTP_ADDRESS=0.0.0.0
      - HTTP_PORT=3000
      - RUST_BACKEND_URL=http://rust-backend:8000
      - CONFIG_DIR=/config
    volumes:
      - ./config:/config
    depends_on:
      - rust-backend
    restart: unless-stopped
