<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beacon WMS Test Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: sans-serif; display: flex; height: 100vh; flex-direction: column; }

    #toolbar {
      background: #1e2a38;
      color: #fff;
      padding: 8px 14px;
      display: flex;
      align-items: flex-start;
      gap: 16px;
      flex-shrink: 0;
      flex-wrap: wrap;
      max-height: 30vh;
      overflow-y: auto;
    }
    #toolbar h1 { font-size: 15px; font-weight: 600; margin-right: 8px; }
    #toolbar label { font-size: 12px; display: flex; align-items: center; gap: 6px; cursor: pointer; }
    #toolbar input[type=checkbox] { cursor: pointer; }
    #toolbar select { font-size: 12px; padding: 2px 6px; border-radius: 3px; border: none; }
    #layer-controls {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .layer-control {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .layer-control label {
      white-space: nowrap;
    }
    .layer-controls-msg {
      font-size: 12px;
      opacity: 0.85;
    }
    .layer-control input[type=text] {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      border: none;
      width: 220px;
      font-family: monospace;
    }
    .layer-control select.dim-select {
      font-size: 11px;
      padding: 2px 4px;
      border-radius: 3px;
      border: none;
      max-width: 200px;
      font-family: monospace;
    }
    .dim-label {
      font-size: 10px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-left: 4px;
    }

    #container { display: flex; flex: 1; overflow: hidden; }

    #map { flex: 1; }

    #sidebar {
      width: 320px;
      flex-shrink: 0;
      background: #f5f7fa;
      border-left: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #sidebar-header {
      background: #2c3e50;
      color: #fff;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #sidebar-header span { font-weight: normal; font-size: 11px; opacity: 0.7; }
    #feature-info-content {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      font-size: 12px;
      color: #333;
    }
    .feature-card {
      background: #fff;
      border: 1px solid #dde3ec;
      border-radius: 5px;
      padding: 10px;
      margin-bottom: 8px;
    }
    .feature-card h3 { font-size: 12px; font-weight: 600; margin-bottom: 6px; color: #2c3e50; }
    .feature-card table { width: 100%; border-collapse: collapse; }
    .feature-card td { padding: 3px 5px; border-bottom: 1px solid #eee; vertical-align: top; }
    .feature-card td:first-child { font-weight: 500; color: #555; width: 45%; }
    .no-features { color: #888; text-align: center; margin-top: 20px; }
    .loading { color: #555; text-align: center; margin-top: 20px; }
    .error-msg { color: #c0392b; padding: 8px; background: #fdecea; border-radius: 4px; }

    #query-cursor { cursor: crosshair !important; }
    .leaflet-container.query-active { cursor: crosshair !important; }

    #status-bar {
      background: #ecf0f1;
      border-top: 1px solid #ccc;
      padding: 3px 10px;
      font-size: 11px;
      color: #666;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<div id="toolbar">
  <h1>Beacon WMS</h1>

  <div id="layer-controls">
    <span class="layer-controls-msg">Loading layers from GetCapabilities…</span>
  </div>

  <label title="Click on the map to query features at that location">
    <input type="checkbox" id="toggle-query" />
    Query features on click
  </label>
</div>

<div id="container">
  <div id="map"></div>
  <div id="sidebar">
    <div id="sidebar-header">
      Feature Info
      <span id="click-coords"></span>
    </div>
    <div id="feature-info-content">
      <p class="no-features">Enable "Query features on click" and click the map.</p>
    </div>
  </div>
</div>

<div id="status-bar">Ready</div>

<script>
  
  //const WMS_URL = 'http://cdi/envri-hub/wms/workspaces/default/wms';
  const WMS_URL = 'http://localhost:3000/wms';
  //const WMS_URL = 'https://ows.emodnet-bathymetry.eu/wms';

  const layerControls = document.getElementById('layer-controls');
  const layerConfigs = [];
  const wmsLayers = new Map();

  // ── Map setup ────────────────────────────────────────────────
  const map = L.map('map', {
    center: [52.3, 4.3],
    zoom: 6,
  });

  // Base layer — maris tile server (Web Mercator / EPSG:3857)
  L.tileLayer('https://{s}.maris.nl/cdi/{z}/{x}/{y}.png', {
    subdomains: ['tile', 'tile-a', 'tile-b', 'tile-c'],
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19,
  }).addTo(map);

  // ── WMS layers ───────────────────────────────────────────────
  const wmsOptions = (layerId, style, viewparams, dims) => {
    const opts = {
      layers:      layerId,
      styles:      style || '',
      format:      'image/png',
      transparent: true,
      version:     '1.3.0',
      attribution: 'Beacon WMS',
    };
    if (viewparams) opts.viewparams = viewparams;
    if (dims) {
      if (dims.TIME) opts.time = dims.TIME;
      if (dims.ELEVATION) opts.elevation = dims.ELEVATION;
    }
    return opts;
  };

  const directChildrenByName = (node, localName) =>
    Array.from(node.children).filter(child => child.localName === localName);

  const firstDirectChildText = (node, localName) => {
    const child = directChildrenByName(node, localName)[0];
    return child ? child.textContent.trim() : '';
  };

  // ── ISO 8601 duration & interval expansion ─────────────────
  function parseISO8601Duration(str) {
    const m = str.match(/^P(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)D)?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?)?$/);
    if (!m) return null;
    return {
      years:   parseInt(m[1] || 0, 10),
      months:  parseInt(m[2] || 0, 10),
      days:    parseInt(m[3] || 0, 10),
      hours:   parseInt(m[4] || 0, 10),
      minutes: parseInt(m[5] || 0, 10),
      seconds: parseInt(m[6] || 0, 10),
    };
  }

  function addDuration(date, dur) {
    const d = new Date(date);
    d.setUTCFullYear(d.getUTCFullYear() + dur.years);
    d.setUTCMonth(d.getUTCMonth() + dur.months);
    d.setUTCDate(d.getUTCDate() + dur.days);
    d.setUTCHours(d.getUTCHours() + dur.hours);
    d.setUTCMinutes(d.getUTCMinutes() + dur.minutes);
    d.setUTCSeconds(d.getUTCSeconds() + dur.seconds);
    return d;
  }

  /**
   * Expand an ISO 8601 time interval into discrete values.
   * Supported forms:
   *   start/end/period   → enumerate from start to end stepping by period
   *   start/period       → enumerate from start to now stepping by period
   * Returns an array of ISO date strings, or null if not an interval.
   * Capped at 5000 steps to avoid runaway expansion.
   */
  function expandTimeInterval(spec) {
    const parts = spec.split('/');
    if (parts.length < 2 || parts.length > 3) return null;

    let start, end, dur;
    if (parts.length === 3) {
      // start/end/period
      start = new Date(parts[0]);
      end   = new Date(parts[1]);
      dur   = parseISO8601Duration(parts[2]);
    } else {
      // start/period  or  period/end  — we handle start/period
      if (parts[1].startsWith('P')) {
        start = new Date(parts[0]);
        end   = new Date();  // now
        dur   = parseISO8601Duration(parts[1]);
      } else if (parts[0].startsWith('P')) {
        // period/end — less common, expand backwards
        end   = new Date(parts[1]);
        dur   = parseISO8601Duration(parts[0]);
        if (!dur || isNaN(end.getTime())) return null;
        // Walk backwards from end; collect then reverse
        const vals = [];
        let cursor = new Date(end);
        const negDur = {
          years: -dur.years, months: -dur.months, days: -dur.days,
          hours: -dur.hours, minutes: -dur.minutes, seconds: -dur.seconds,
        };
        for (let i = 0; i < 5000; i++) {
          vals.push(cursor.toISOString());
          const prev = addDuration(cursor, negDur);
          if (prev.getTime() >= cursor.getTime()) break;
          cursor = prev;
        }
        return vals.reverse();
      } else {
        return null;
      }
    }

    if (!dur || isNaN(start.getTime()) || isNaN(end.getTime())) return null;

    const values = [];
    let cursor = new Date(start);
    for (let i = 0; i < 5000 && cursor.getTime() <= end.getTime(); i++) {
      values.push(cursor.toISOString());
      const next = addDuration(cursor, dur);
      if (next.getTime() <= cursor.getTime()) break; // zero/negative step guard
      cursor = next;
    }
    return values;
  }

  function extractLeafLayers(layerEl, out) {
    const childLayers = directChildrenByName(layerEl, 'Layer');
    const name = firstDirectChildText(layerEl, 'Name');
    const title = firstDirectChildText(layerEl, 'Title');

    if (name && childLayers.length === 0) {
      const styles = directChildrenByName(layerEl, 'Style')
        .map(styleEl => firstDirectChildText(styleEl, 'Name'))
        .filter(Boolean);

      // Parse Dimension elements for TIME / ELEVATION
      const dimensions = {};
      for (const dimEl of directChildrenByName(layerEl, 'Dimension')) {
        const dimName = (dimEl.getAttribute('name') || '').toUpperCase();
        if (dimName === 'TIME' || dimName === 'ELEVATION') {
          const defaultVal = dimEl.getAttribute('default') || '';
          const valuesText = dimEl.textContent.trim();
          // Values can be comma-separated discrete values or interval specs
          let values = valuesText ? valuesText.split(',').map(v => v.trim()).filter(Boolean) : [];

          // Expand any interval specs (start/end/period or start/period)
          if (dimName === 'TIME') {
            const expanded = [];
            for (const v of values) {
              if (v.includes('/')) {
                const result = expandTimeInterval(v);
                if (result) expanded.push(...result);
                else expanded.push(v); // keep raw if unparseable
              } else {
                expanded.push(v);
              }
            }
            values = expanded;
          }

          dimensions[dimName] = { default: defaultVal, values };
        }
      }

      out.push({
        id: name,
        title: title || name,
        styles,
        dimensions,
      });
      return;
    }

    for (const child of childLayers) {
      extractLeafLayers(child, out);
    }
  }

  function buildLayerControls(capabilityLayers) {
    layerConfigs.length = 0;
    layerControls.innerHTML = '';

    capabilityLayers.forEach((layer, idx) => {
      const control = document.createElement('div');
      control.className = 'layer-control';

      const toggle = document.createElement('input');
      toggle.type = 'checkbox';
      toggle.id = `toggle-layer-${idx}`;
      toggle.checked = idx === 0;

      const label = document.createElement('label');
      label.setAttribute('for', toggle.id);
      label.textContent = layer.title;

      const styleSelect = document.createElement('select');
      styleSelect.id = `style-layer-${idx}`;
      styleSelect.title = `Select style for ${layer.title}`;

      const defaultOption = document.createElement('option');
      defaultOption.value = '';
      defaultOption.textContent = 'default';
      styleSelect.append(defaultOption);

      for (const styleName of layer.styles) {
        const option = document.createElement('option');
        option.value = styleName;
        option.textContent = styleName;
        styleSelect.append(option);
      }

      const viewparamsInput = document.createElement('input');
      viewparamsInput.type = 'text';
      viewparamsInput.id = `viewparams-layer-${idx}`;
      viewparamsInput.placeholder = 'viewparams  e.g. year:2021;depth:0,10';
      viewparamsInput.title = 'VIEWPARAMS (key:value pairs separated by ;)';

      control.append(toggle, label, styleSelect, viewparamsInput);

      // Build dimension controls (TIME / ELEVATION)
      const dimEls = {};
      for (const dimName of ['TIME', 'ELEVATION']) {
        const dim = layer.dimensions[dimName];
        if (!dim) continue;

        const dimLabel = document.createElement('span');
        dimLabel.className = 'dim-label';
        dimLabel.textContent = dimName === 'ELEVATION' ? 'Elev:' : 'Time:';

        if (dim.values.length > 0 && !dim.values.some(v => v.includes('/'))) {
          // Discrete values → dropdown
          const sel = document.createElement('select');
          sel.className = 'dim-select';
          sel.id = `dim-${dimName.toLowerCase()}-layer-${idx}`;
          sel.title = `${dimName} dimension for ${layer.title}`;
          for (const val of dim.values) {
            const opt = document.createElement('option');
            opt.value = val;
            opt.textContent = val;
            if (val === dim.default) opt.selected = true;
            sel.append(opt);
          }
          dimEls[dimName] = sel;
          control.append(dimLabel, sel);
        } else {
          // Interval or freeform → text input
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.className = 'dim-select';
          inp.id = `dim-${dimName.toLowerCase()}-layer-${idx}`;
          inp.placeholder = dim.default || (dimName === 'TIME' ? '2024-01-01T00:00:00Z' : '0');
          inp.value = dim.default;
          inp.title = `${dimName} dimension for ${layer.title}`;
          inp.style.width = dimName === 'TIME' ? '180px' : '80px';
          dimEls[dimName] = inp;
          control.append(dimLabel, inp);
        }
      }

      control.append(document.createElement('br'));

      layerControls.append(control);

      const getDimValues = () => {
        const d = {};
        for (const dimName of ['TIME', 'ELEVATION']) {
          if (!dimEls[dimName]) continue;
          const val = dimEls[dimName].value;
          if (val) d[dimName] = val;
        }
        return Object.keys(d).length ? d : null;
      };

      const cfg = {
        id: layer.id,
        toggleEl: toggle,
        styleEl: styleSelect,
        viewparamsEl: viewparamsInput,
        dimEls,
        getDimValues,
      };
      layerConfigs.push(cfg);

      const tile = L.tileLayer.wms(WMS_URL, wmsOptions(cfg.id, styleSelect.value, viewparamsInput.value, getDimValues()));
      wmsLayers.set(cfg.id, tile);
      if (toggle.checked) {
        tile.addTo(map);
      }

      toggle.addEventListener('change', () => {
        const current = wmsLayers.get(cfg.id);
        if (!current) return;
        toggle.checked ? current.addTo(map) : map.removeLayer(current);
      });

      function refreshLayer() {
        const current = wmsLayers.get(cfg.id);
        if (current && map.hasLayer(current)) {
          map.removeLayer(current);
        }

        const next = L.tileLayer.wms(WMS_URL, wmsOptions(cfg.id, styleSelect.value, viewparamsInput.value, getDimValues()));
        wmsLayers.set(cfg.id, next);
        if (toggle.checked) {
          next.addTo(map);
        }
      }

      styleSelect.addEventListener('change', refreshLayer);

      let viewparamsTimer;
      viewparamsInput.addEventListener('input', () => {
        clearTimeout(viewparamsTimer);
        viewparamsTimer = setTimeout(refreshLayer, 600);
      });
      viewparamsInput.addEventListener('change', refreshLayer);

      // Wire up dimension controls
      for (const dimName of ['TIME', 'ELEVATION']) {
        const el = dimEls[dimName];
        if (!el) continue;
        if (el.tagName === 'SELECT') {
          el.addEventListener('change', refreshLayer);
        } else {
          let dimTimer;
          el.addEventListener('input', () => {
            clearTimeout(dimTimer);
            dimTimer = setTimeout(refreshLayer, 600);
          });
          el.addEventListener('change', refreshLayer);
        }
      }
    });

    if (layerConfigs.length === 0) {
      layerControls.innerHTML = '<span class="layer-controls-msg">No named layers found in GetCapabilities.</span>';
    }
  }

  async function loadCapabilitiesLayers() {
    const params = new URLSearchParams({
      SERVICE: 'WMS',
      VERSION: '1.3.0',
      REQUEST: 'GetCapabilities',
    });

    const response = await fetch(`${WMS_URL}?${params}`);

    if (!response.ok) {
      throw new Error(`GetCapabilities failed with status ${response.status}`);
    }

    const xmlText = await response.text();
    const xmlDoc = new DOMParser().parseFromString(xmlText, 'text/xml');

    if (xmlDoc.querySelector('parsererror')) {
      throw new Error('Invalid XML in GetCapabilities response');
    }

    const capability = Array.from(xmlDoc.getElementsByTagName('*')).find(node => node.localName === 'Capability');
    const capabilityRootLayer = capability ? directChildrenByName(capability, 'Layer')[0] : null;
    if (!capabilityRootLayer) {
      throw new Error('No Capability/Layer element found in GetCapabilities response');
    }

    const layers = [];
    extractLeafLayers(capabilityRootLayer, layers);
    buildLayerControls(layers);
  }

  loadCapabilitiesLayers().catch(err => {
    console.error('Error loading GetCapabilities:', err);
    layerControls.innerHTML = `<span class="layer-controls-msg">Could not load layers: ${err.message}</span>`;
  });

  // ── GetFeatureInfo ───────────────────────────────────────────
  const queryToggle  = document.getElementById('toggle-query');
  const statusBar    = document.getElementById('status-bar');
  const clickCoords  = document.getElementById('click-coords');
  const infoContent  = document.getElementById('feature-info-content');
  const clickMarker = L.circleMarker([0, 0], { radius: 6, color: '#c0392b', fillColor: '#e74c3c', fillOpacity: 0 })

  queryToggle.addEventListener('change', () => {
    if (queryToggle.checked) {
      map.getContainer().classList.add('query-active');
      statusBar.textContent = 'Click on the map to query features.';
    } else {
      map.getContainer().classList.remove('query-active');
      statusBar.textContent = 'Ready';
      infoContent.innerHTML = '<p class="no-features">Enable "Query features on click" and click the map.</p>';
      clickCoords.textContent = '';
    }
  });

  map.on('click', async e => {
    if (!queryToggle.checked) return;

    const latlng   = e.latlng;

    if(map.hasLayer(clickMarker)) {
      map.removeLayer(clickMarker);
    }
    //place marker at clicked location
    clickMarker.setLatLng(latlng).addTo(map);

    const size     = map.getSize();          // {x: px_width, y: px_height}
    const bounds   = map.getBounds();
    const point    = map.latLngToContainerPoint(latlng); // pixel offset from top-left

    clickCoords.textContent = `${latlng.lat.toFixed(5)}, ${latlng.lng.toFixed(5)}`;
    statusBar.textContent = `Querying at ${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)}…`;
    infoContent.innerHTML = '<p class="loading">Loading…</p>';

    // WMS 1.3.0 + EPSG:3857: BBOX is minX,minY,maxX,maxY in metres
    const sw     = bounds.getSouthWest();
    const ne     = bounds.getNorthEast();
    const swProj = L.CRS.EPSG3857.project(sw);
    const neProj = L.CRS.EPSG3857.project(ne);
    const bbox   = `${swProj.x},${swProj.y},${neProj.x},${neProj.y}`;

    // Collect active queryable layers
    const activeConfigs = layerConfigs.filter(cfg => cfg.toggleEl.checked);
    const activeLayers = activeConfigs.map(cfg => cfg.id);
    const activeStyles = activeConfigs.map(cfg => cfg.styleEl.value || '');
    const activeViewparams = activeConfigs.map(cfg => cfg.viewparamsEl.value || '').join(';');

    if (activeLayers.length === 0) {
      infoContent.innerHTML = '<p class="no-features">No layers are currently visible.</p>';
      statusBar.textContent = 'Ready';
      return;
    }

    const layerStr = activeLayers.join(',');

    const params = new URLSearchParams({
      SERVICE:      'WMS',
      VERSION:      '1.3.0',
      REQUEST:      'GetFeatureInfo',
      LAYERS:       layerStr,
      QUERY_LAYERS: layerStr,
      INFO_FORMAT:  'application/json',
      CRS:          'EPSG:3857',
      BBOX:         bbox,
      WIDTH:        size.x.toString(),
      HEIGHT:       size.y.toString(),
      I:            Math.round(point.x).toString(),
      J:            Math.round(point.y).toString(),
      FEATURE_COUNT: '10',
      STYLES:       activeStyles.join(','),
    });

    if (activeViewparams) params.set('VIEWPARAMS', activeViewparams);

    // Collect dimension values from active layers (use first non-empty value per dimension)
    for (const dimName of ['TIME', 'ELEVATION']) {
      for (const cfg of activeConfigs) {
        if (cfg.dimEls && cfg.dimEls[dimName]) {
          const val = cfg.dimEls[dimName].value;
          if (val) { params.set(dimName, val); break; }
        }
      }
    }

    try {
      const resp = await fetch(`${WMS_URL}?${params}`);
      if (!resp.ok) {
        const text = await resp.text();
        infoContent.innerHTML = `<p class="error-msg">Server error ${resp.status}: ${text}</p>`;
        statusBar.textContent = 'Query failed.';
        return;
      }

      const data = await resp.json();
      renderFeatures(data);
      const count = data.features ? data.features.length : 0;
      statusBar.textContent = `Found ${count} feature(s) at ${latlng.lat.toFixed(4)}, ${latlng.lng.toFixed(4)}`;
    } catch (err) {
      infoContent.innerHTML = `<p class="error-msg">Request failed: ${err.message}</p>`;
      statusBar.textContent = 'Query failed.';
    }
  });

  function renderFeatures(collection) {
    const features = collection.features || [];
    if (features.length === 0) {
      infoContent.innerHTML = '<p class="no-features">No features found at this location.</p>';
      return;
    }

    const cards = features.map((f, idx) => {
      const props = f.properties || {};
      const rows = Object.entries(props)
        .map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`)
        .join('');
      const geom = f.geometry && f.geometry.coordinates
        ? `${f.geometry.coordinates[1].toFixed(5)}, ${f.geometry.coordinates[0].toFixed(5)}`
        : '';
      return `
        <div class="feature-card">
          <h3>Feature ${idx + 1}${geom ? ` — ${geom}` : ''}</h3>
          <table>${rows || '<tr><td colspan="2"><em>no properties</em></td></tr>'}</table>
        </div>`;
    });

    infoContent.innerHTML = cards.join('');
  }
</script>
</body>
</html>
